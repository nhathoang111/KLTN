# Database Configuration - Using MySQL with Docker
# MySQL local bằng XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/schoolmanagement?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Character encoding configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logging configuration
logging.level.com.example.schoolmanagement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.file.name=app.log

# Server port
server.port=8080

# JPA Configuration
spring.jpa.open-in-view=false

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
GEMINI_API_KEY=
GEMINI_MODEL=gemini-2.5-flash